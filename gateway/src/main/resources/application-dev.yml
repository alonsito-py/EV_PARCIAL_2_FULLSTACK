        - id: swagger-facturacion
          uri: http://localhost:8093
          predicates:
            - Path=/aggregate/facturacion/**
          filters:
            - RewritePath=/aggregate/facturacion/(?<segment>.*), /$\{segment}

        - id: swagger-reporte
          uri: http://localhost:8094
          predicates:
            - Path=/aggregate/reporte/**
          filters:
            - RewritePath=/aggregate/reporte/(?<segment>.*), /$\{segment}

        - id: swagger-marketing
          uri: http://localhost:8095
          predicates:
