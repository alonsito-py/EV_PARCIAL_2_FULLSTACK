spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: autenticacion-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/usuarios/**, /api/v2/usuarios/**

        - id: cliente-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/clientes/**, /api/v2/clientes/**

        - id: direccion-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/direcciones/**, /api/v2/direcciones/**

        - id: producto-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/productos/**, /api/v2/productos/**

        - id: inventario-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/inventario/**, /api/v2/inventario/**

        - id: promocion-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/promociones/**, /api/v2/promociones/**

        - id: carrito-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/carrito/**, /api/v2/carrito/**

        - id: pedido-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/pedidos/**, /api/v2/pedidos/**

        - id: pago-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/pagos/**, /api/v2/pagos/**

        - id: bodega-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/bodega/**, /api/v2/bodega/**

        - id: despacho-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/v1/despacho/**, /api/v2/despacho/**

        - id: notificacion-service
          uri: http://localhost:8092
          predicates:
            - Path=/api/v1/notificaciones/**, /api/v2/notificaciones/**

        - id: facturacion-service
          uri: http://localhost:8093
          predicates:
            - Path=/api/v1/facturacion/**, /api/v2/facturacion/**

        - id: reporte-service
          uri: http://localhost:8094
          predicates:
            - Path=/api/v1/reportes/**, /api/v2/reportes/**

        - id: marketing-service
          uri: http://localhost:8095
          predicates:
            - Path=/api/v1/marketing/**, /api/v2/marketing/**

        - id: swagger-autenticacion
          uri: http://localhost:8081
          predicates:
            - Path=/aggregate/autenticacion/**
          filters:
            - RewritePath=/aggregate/autenticacion/(?<segment>.*), /$\{segment}

        - id: swagger-cliente
          uri: http://localhost:8082
          predicates:
            - Path=/aggregate/cliente/**
          filters:
            - RewritePath=/aggregate/cliente/(?<segment>.*), /$\{segment}

        - id: swagger-direccion
          uri: http://localhost:8083
          predicates:
            - Path=/aggregate/direccion/**
          filters:
            - RewritePath=/aggregate/direccion/(?<segment>.*), /$\{segment}

        - id: swagger-producto
          uri: http://localhost:8084
          predicates:
            - Path=/aggregate/producto/**
          filters:
            - RewritePath=/aggregate/producto/(?<segment>.*), /$\{segment}

        - id: swagger-inventario
          uri: http://localhost:8085
          predicates:
            - Path=/aggregate/inventario/**
