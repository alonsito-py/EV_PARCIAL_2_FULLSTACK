            - Path=/aggregate/promocion/**
          filters:
            - RewritePath=/aggregate/promocion/(?<segment>.*), /$\{segment}

        - id: swagger-carrito
          uri: http://localhost:8087
          predicates:
            - Path=/aggregate/carrito/**
          filters:
            - RewritePath=/aggregate/carrito/(?<segment>.*), /$\{segment}

        - id: swagger-pedido
          uri: http://localhost:8088
          predicates:
            - Path=/aggregate/pedido/**
          filters:
            - RewritePath=/aggregate/pedido/(?<segment>.*), /$\{segment}

        - id: swagger-pago
          uri: http://localhost:8089
          predicates:
            - Path=/aggregate/pago/**
          filters:
            - RewritePath=/aggregate/pago/(?<segment>.*), /$\{segment}

        - id: swagger-bodega
          uri: http://localhost:8090
          predicates:
            - Path=/aggregate/bodega/**
          filters:
            - RewritePath=/aggregate/bodega/(?<segment>.*), /$\{segment}

        - id: swagger-despacho
          uri: http://localhost:8091
          predicates:
            - Path=/aggregate/despacho/**
          filters:
            - RewritePath=/aggregate/despacho/(?<segment>.*), /$\{segment}

        - id: swagger-notificacion
          uri: http://localhost:8092
