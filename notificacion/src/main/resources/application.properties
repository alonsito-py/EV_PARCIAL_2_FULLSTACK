spring.application.name=notificacion
server.port=8092
spring.datasource.url=jdbc:mysql://localhost:3306/db_notificaciones
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
logging.level.root=INFO
logging.level.com.urbano.notificacion=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%-5level] %logger{36} - %msg%n
logging.file.name=logs/urbano-notificacion.log
logging.level.file=INFO
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
